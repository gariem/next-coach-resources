<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — Next Coach</title>
  <link rel="canonical" href="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #14141f;
      --border: #1e1e2e;
      --text: #e4e4ed;
      --text-dim: #8888a0;
      --accent: #6366f1;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
    }

    nav {
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      max-width: 960px;
      margin: 0 auto;
      padding-left: 24px;
      padding-right: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-brand {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    main {
      padding: 60px 0 80px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 32px;
    }

    h2 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-top: 40px;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }

    h3 {
      font-size: 1.05rem;
      font-weight: 600;
      margin-top: 28px;
      margin-bottom: 8px;
    }

    p {
      color: var(--text-dim);
      margin-bottom: 16px;
      font-size: 0.95rem;
    }

    strong { color: var(--text); }

    ul, ol {
      color: var(--text-dim);
      margin-bottom: 16px;
      padding-left: 24px;
      font-size: 0.95rem;
    }

    li { margin-bottom: 6px; }

    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }

    address {
      font-style: normal;
      color: var(--text);
      margin-bottom: 16px;
      line-height: 1.7;
    }

    footer {
      padding: 40px 0;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .footer-links a {
      color: var(--text-dim);
      font-size: 0.88rem;
      font-weight: 500;
    }
    .footer-links a:hover { color: var(--text); }
    .footer-copy {
      color: #555568;
      font-size: 0.82rem;
    }

    @media (max-width: 600px) {
      main { padding: 40px 0 60px; }
      h1 { font-size: 1.6rem; }
      .nav-links { gap: 16px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="./" class="nav-brand">Next Coach</a>
    <div class="nav-links">
      <a href="./#features">Features</a>
      <a href="./#showcase">Screens</a>
      <a href="support">Support</a>
    </div>
  </nav>

  <main>
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-links">
        <a href="privacy">Privacy Policy</a>
        <a href="support">Support</a>
        <a href="impressum">Impressum</a>
        <a href="https://github.com/gariem/next-coach-resources/issues">Report an Issue</a>
      </div>
      <p class="footer-copy">&copy; 2026 Emilio Rios. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
